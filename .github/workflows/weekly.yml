name: Weekly Bootstrap LP Tracker

on:
  schedule:
    # 02:00 UTC every Thursday — ~2h AFTER the epoch flip, so the just-closed
    # epoch has final fees/volume and finalized incentive distribution.
    # weekly_bootstrap_update.py auto-selects the just-closed epoch via its 24h grace window.
    - cron: '0 2 * * 4'
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit + push results back to main

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Run weekly bootstrap update (records the just-closed epoch)
        run: python weekly_bootstrap_update.py

      - name: Seed the new epoch (carry roster forward so the live tab isn't stale)
        run: python weekly_bootstrap_update.py --ensure-epoch

      - name: Commit & push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bootstrap_tracker.csv bootstrap.html bootstrap_picks.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bootstrap weekly: epoch update $(date -u +%Y-%m-%d)"
            git push
          fi
