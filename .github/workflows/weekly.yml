name: Weekly Bootstrap LP Tracker

on:
  schedule:
    # 23:59 UTC every Wednesday — just before the Thu epoch flip.
    # weekly_bootstrap_update.py auto-selects the closing epoch (with 24h grace).
    - cron: '59 23 * * 3'
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit + push results back to main

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Run weekly bootstrap update
        run: python weekly_bootstrap_update.py

      - name: Commit & push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bootstrap_tracker.csv bootstrap.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bootstrap weekly: epoch update $(date -u +%Y-%m-%d)"
            git push
          fi
