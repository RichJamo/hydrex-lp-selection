name: Daily Hydrex Pool Tracker

on:
  schedule:
    # 14:30 UTC = 9:30am CT during DST (CDT). Adjust to 15:30 in winter (CST).
    - cron: '30 14 * * *'
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit + push results back to main

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet requests "eth-utils" "eth-hash[pycryptodome]"

      - name: Pull daily pool data
        run: python hydrex_daily_pull.py

      - name: Detect fee-parameter changes
        run: python hydrex_param_changes.py

      - name: Regenerate chart
        run: python build_hydrex_pools_chart.py

      - name: Commit & push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hydrex_pools_daily.csv data/hydrex_param_changes.csv hydrex_pools.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily pool tracker update $(date -u +%Y-%m-%d)"
            git push
          fi
